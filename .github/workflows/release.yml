name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  formula-pr:
    runs-on: ubuntu-latest
    needs: [release]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: sfb
          homebrew-tap: henkas/homebrew-tap
          formula-path: Formula/sfb.rb
        env:
          COMMITTER_TOKEN: ${{ secrets.TAP_TOKEN }}
